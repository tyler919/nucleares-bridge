# Nucleares variables to poll.
# Add or remove entries as needed.
# "name" must exactly match the variable name the game API expects.
#
# NOTE: Generator and turbine variable names are based on observed community
# usage. If a variable returns null, verify the exact name against the
# official Nucleares webserver documentation or the in-game tablet API list.

